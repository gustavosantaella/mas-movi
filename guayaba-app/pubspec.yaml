name: guayaba_app
description: MaaS transport payment app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Navigation
  go_router: ^14.8.1
  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.4
  # Storage
  flutter_secure_storage: ^9.2.4
  # BLE
  flutter_ble_peripheral: ^1.1.0
  flutter_blue_plus: ^1.35.5
  # QR
  mobile_scanner: ^6.0.5
  qr_flutter: ^4.1.0
  # Auth
  local_auth: ^2.3.0
  # Camera
  image_picker: ^1.1.2
  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  uuid: ^4.5.3
  socket_io_client: ^3.1.4
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  image_gallery_saver_plus: ^4.0.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
